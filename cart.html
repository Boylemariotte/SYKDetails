<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - K&M Eternal & Love</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <span class="logo-k">K</span><span class="logo-amp">&</span><span class="logo-m">M</span>
                    <span class="logo-subtitle">
                        <span class="logo-eternal">Eternal</span> <span class="logo-amp">&</span> <span class="logo-love">Love</span>
                    </span>
                </a>
            </div>
            
            <nav class="nav-desktop">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="catalog.html">Catálogo</a></li>
                    <li><a href="#categorias">Categorías</a></li>
                    <li><a href="#testimonios">Testimonios</a></li>
                    <li><a href="#contacto">Contacto</a></li>
                </ul>
            </nav>
            
            <div class="nav-actions">
                <button class="cart-btn active">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="cart-count">0</span>
                </button>
            </div>
            
            <button class="mobile-menu-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <nav class="mobile-nav">
            <a href="index.html">Inicio</a>
            <a href="catalog.html">Catálogo</a>
            <a href="#categorias">Categorías</a>
            <a href="#testimonios">Testimonios</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </div>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="container">
            <h1>Mi Carrito</h1>
            
            <div class="cart-content" id="cartContent">
                <!-- Cart items will be loaded here -->
            </div>
            
            <div class="cart-summary" id="cartSummary">
                <!-- Cart summary will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Recommended Products -->
    <section class="recommended-products">
        <div class="container">
            <div class="section-header">
                <h2>Te podría gustar</h2>
                <div class="gold-line"></div>
            </div>
            
            <div class="products-grid" id="recommendedGrid">
                <!-- Recommended products will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" id="contacto">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <a href="index.html" style="text-decoration: none; color: inherit;">
                        <span class="logo-k">K</span><span class="logo-amp">&</span><span class="logo-m">M</span>
                        <div class="logo-subtitle">
                            <span class="logo-eternal">Eternal</span> <span class="logo-amp">&</span> <span class="logo-love">Love</span>
                        </div>
                    </a>
                </div>
                <p>&copy; 2024 K&M Eternal & Love. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
